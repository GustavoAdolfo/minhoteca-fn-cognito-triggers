name: Import Cognito User Pool

on:
  workflow_dispatch:
    inputs:
      user_pool_id:
        description: 'ID do User Pool existente a ser importado (deixe em branco para usar USER_POOL_ID do environment prod)'
        required: false
        type: string
      resource_address:
        description: 'Endereço do recurso Terraform no módulo'
        required: false
        default: 'module.lambda.aws_cognito_user_pool.existing'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import-user-pool:
    runs-on: ubuntu-latest
    environment: prod

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Configurar Credenciais da AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionMinhoteca
          aws-region: us-east-1
          role-session-name: GitHubActionsTerraformImport
          disable-retry: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        run: npm run build

      - name: Resolve import target
        id: target
        run: |
          RESOURCE_ADDRESS="${{ inputs.resource_address }}"
          echo "resource_address=${RESOURCE_ADDRESS}" >> "$GITHUB_OUTPUT"

          # Prioridade: input manual > variável do environment prod
          USER_POOL_ID="${{ inputs.user_pool_id }}"
          if [ -z "$USER_POOL_ID" ]; then
            USER_POOL_ID="${{ vars.USER_POOL_ID || secrets.USER_POOL_ID }}"
          fi

          if [ -z "$USER_POOL_ID" ]; then
            echo "::error::user_pool_id não informado e USER_POOL_ID não encontrado no environment prod."
            exit 1
          fi

          echo "user_pool_id=${USER_POOL_ID}" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        working-directory: terraform/envs/prod
        run: terraform init -backend-config=default.conf

      - name: Check if User Pool is already imported
        id: state
        working-directory: terraform/envs/prod
        run: |
          if terraform state list | grep -Fxq "${{ steps.target.outputs.resource_address }}"; then
            echo "already_imported=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_imported=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Import User Pool
        if: steps.state.outputs.already_imported != 'true'
        working-directory: terraform/envs/prod
        env:
          TF_VAR_appregistry_id: ${{ vars.APPREGISTRY_ID || secrets.APPREGISTRY_ID }}
          TF_VAR_user_pool_id: ${{ steps.target.outputs.user_pool_id }}
          TF_VAR_user_pool_client_id: ${{ vars.USER_POOL_CLIENT_ID || secrets.USER_POOL_CLIENT_ID }}
          TF_VAR_bucket_arquivos: ${{ vars.BUCKET_ARQUIVOS || secrets.BUCKET_ARQUIVOS }}
          TF_VAR_bucket_templates: ${{ vars.BUCKET_TEMPLATES || secrets.BUCKET_TEMPLATES }}
          TF_VAR_logo_content_type: ${{ vars.LOGO_CONTENT_TYPE || secrets.LOGO_CONTENT_TYPE }}
          TF_VAR_logo_img: ${{ vars.LOGO_IMG || secrets.LOGO_IMG }}
          TF_VAR_template_email_confirmation: ${{ vars.TEMPLATE_EMAIL_CONFIRMATION || secrets.TEMPLATE_EMAIL_CONFIRMATION }}
          TF_VAR_template_email_login: ${{ vars.TEMPLATE_EMAIL_LOGIN || secrets.TEMPLATE_EMAIL_LOGIN }}
          TF_VAR_template_email_signup: ${{ vars.TEMPLATE_EMAIL_SIGNUP || secrets.TEMPLATE_EMAIL_SIGNUP }}
          TF_VAR_email_about_link: ${{ vars.EMAIL_ABOUT_LINK || secrets.EMAIL_ABOUT_LINK }}
          TF_VAR_email_privacy_policy_link: ${{ vars.EMAIL_PRIVACY_POLICY_LINK || secrets.EMAIL_PRIVACY_POLICY_LINK }}
          TF_VAR_email_use_term: ${{ vars.EMAIL_USE_TERM || secrets.EMAIL_USE_TERM }}
        run: terraform import -input=false ${{ steps.target.outputs.resource_address }} ${{ steps.target.outputs.user_pool_id }}

      - name: Terraform State List
        working-directory: terraform/envs/prod
        run: terraform state list
